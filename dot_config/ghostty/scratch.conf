# Scratchpad-only ghostty config. Loaded by the alt-backtick aerospace
# binding via --config-file=, on top of ~/.config/ghostty/config. tmux
# owns multiplexing inside the scratch window, so the scratch Ghostty
# stays minimal — no native tabs, no modal keymap, no per-tab title
# plumbing. Modal nav (Ctrl-s/a/b/q + hjkl) lives in the user's tmux
# config and carries over automatically once we attach to the "scratch"
# session.

window-save-state = never
macos-window-buttons = hidden

# Scratch is a quick-glance HUD, not a long-form coding surface — bump
# font-size +2 from Ghostty's default 13 so it's readable at a glance
# without leaning in. Equivalent to cmd-plus twice from default.
font-size = 15

# Run attach.sh directly as Ghostty's "shell". exec'ing tmuxinator inside
# the script bypasses the user's login zsh — without `shell-integration =
# none`, Ghostty wraps `command` in zsh -lc to inject hooks, which prints
# the "Last login: …" MOTD for ~1 frame before tmux attaches.
command           = /Users/rjm/.config/scratchpad/attach.sh
shell-integration = none

# Fallback cold-start size + position. scratchpad.sh normally precomputes
# focused-monitor cell counts via `scratch-axpos cells-for` and passes
# them as CLI overrides, so these only get used if that helper is
# unavailable. The 155×52 / (317,118) values are the laptop's tuned
# layout (JetBrainsMono Nerd Font 15pt centred on built-in retina).
window-width      = 155
window-height     = 52
window-position-x = 317
window-position-y = 118

# Ctrl+<digit> CSI-u keybinds, ssh-* shell-integration features, and the
# rest of the keymap are inherited from ~/.config/ghostty/config (Ghostty
# loads it before --config-file=, so anything defined there is in effect
# here too). Don't duplicate them.
