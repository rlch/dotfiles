# tmux — modal Ctrl+s/Ctrl+a/Ctrl+b/Ctrl+q scheme, hjkl everywhere.
# Verbatim port of the prior zellij keymap + zjstatus look.
#
# Modes are custom key-tables. `switch-client -T <table>` enters; bindings
# inside re-enter the table to stay modal. Any unbound key auto-returns to
# root (≈ zellij's "esc/enter exits to normal").

# === General ================================================================
set -g default-shell "/opt/homebrew/bin/fish"
set -g default-terminal "tmux-256color"
set -as terminal-features 'xterm*:RGB'         # 24-bit truecolor
set -as terminal-features 'xterm*:extkeys'     # Ghostty CSI-u: distinct C-1..9, C-/
set -as terminal-features 'xterm*:sitm:ritm'   # italic (selected tab)
set -as terminal-features 'xterm*:usstyle'     # undercurl + colored underlines (LSP diags)
set -as terminal-features 'xterm*:hyperlinks'  # OSC 8 hyperlinks (yazi git, lazygit, etc.)

# Kitty graphics + sixel passthrough — lets yazi (and lazygit's previewers)
# push image bytes straight through tmux to Ghostty. tmux 3.6 forwards SIXEL
# natively but kitty-graphics still requires raw passthrough; allow-passthrough
# enables both. Yazi auto-detects passthrough and stops falling back to chafa.
set -g allow-passthrough on
set -as terminal-features 'xterm*:sixel'

# Forward TERM / TERM_PROGRAM into the server env on each client attach so
# display-popup ptys (which inherit server env, not the running pane's)
# carry the right terminal identity. Without this, yazi's DA1/DSR capability
# probes hit a popup with stale/missing TERM_PROGRAM, time out, and emit
# "Terminal response timeout" + "[server exited unexpectedly]". Detach +
# reattach is enough to refresh — no kill-server needed.
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -s extended-keys on
set -s extended-keys-format csi-u             # Ghostty speaks CSI-u, not modOtherKeys
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy on
set-window-option -g mode-keys vi

# Editor / pager — pin in tmux's global environment so children spawned by
# tmux (not just fish) see them, and so AI CLI tools that temporarily set
# GIT_EDITOR=true can't leave the server polluted across kill-server. Fish
# also exports these in config.fish, but explicit beats inherited.
set-environment -g EDITOR    nvim
set-environment -g VISUAL    nvim
set-environment -g GIT_EDITOR nvim
set-environment -g MANPAGER  'nvim +Man!'
# Refresh from each attaching client (default list is DISPLAY/SSH_*/etc.).
set -ga update-environment EDITOR
set -ga update-environment VISUAL
set -ga update-environment GIT_EDITOR
set -ga update-environment MANPAGER

# Let foreground programs (Claude Code, ssh, etc.) set the window title via
# OSC 0/2. tmux will reflect their escape sequence as the window name.
set -g allow-rename on
set -g automatic-rename off

# Auto-slugify long window names to <= 10 chars (Claude Code task summaries,
# long paths, etc.). Idempotent — second hook fire on our own rename exits
# early because slugify(slug) == slug. Pure text only: tab badges
# (@agent / @agent-done / zoom) render via window-status-format below, not
# via the window name.
set-hook -g window-renamed 'run-shell -b "~/.config/tmux/slugify-title.py #{window_id}"'

# Clear the "agent finished, awaiting reply" indicator the moment you focus
# the tab. @agent-done is set by ~/.claude/agent-done-hook.sh on Claude
# Code's Stop event; the bell badge in the tab status vanishes here once
# the format re-evaluates.
set-hook -g pane-focus-in 'run-shell -b "~/.config/tmux/clear-agent-done.sh #{window_id}"'

# Bell counter — tracks "how many `\a` rang in this window since you last
# visited" so the status bar can show a count, not just a flag. Universal
# signal: cargo finishing, claude Stop hook, ssh disconnect, anything.
# `session-window-changed` resets when you visit (mirrors tmux's own bell-
# flag-on-visit semantics). State lives in $XDG_RUNTIME_DIR — ephemeral.
# Read in formats via `#(~/.config/tmux/tmux-bells.sh window …)`.
set-hook -g alert-bell             'run-shell -b "~/.config/tmux/tmux-bells.sh inc #{q:session_name} #{window_index}; tmux refresh-client -S"'
set-hook -g session-window-changed 'run-shell -b "~/.config/tmux/tmux-bells.sh clear #{q:session_name} #{window_index}; tmux refresh-client -S"'

# History — 20k lines per pane. Comfortable middle-ground above
# tmux-sensible's 50k default isn't needed here; 20k is enough for typical
# compile/test logs without bloating per-pane memory. Re-asserted after
# tmux-sensible at the bottom.
set -g history-limit 20000

# Background-output monitoring is OPT-IN per window — globally on was
# too aggressive (fish prompt redraws etc. fire constantly). Enable on
# the specific tabs you want to track:
#   tmux set-window-option monitor-activity on        # eye badge 󰈈
#   tmux set-window-option monitor-silence  30        # sleep badge 󰒲 after 30s quiet
# monitor-bell stays at its default (on globally) — TUI hardware bells
# are rare and worth surfacing.
#
# Suppress the built-in tab-background inversion on activity/bell — the
# glyphs in @tab-badge already carry the signal; stacking a reverse-style
# on top doubles up and bleeds onto the focused tab during the
# clear-on-focus race window.
set -g window-status-activity-style none
set -g window-status-bell-style     none

# === Theme — catppuccin-mocha =============================================
# Borders.
set -g pane-border-style       "fg=#45475A"
set -g pane-active-border-style "fg=#45475A"
# The mosaic plugin flips this to `top` when it loads (and installs its
# HUD format). `pane z` still toggles between top/off if you want the
# screen real-estate back temporarily.
set -g pane-border-status off

# Status bar — zjstatus parity:
#   format_left   = " #[fg=#89B4FA,bold]{session}#[fg=#CDD6F4] {tabs}"
#   format_right  = "{mode} "
#   tab_normal    = "#[fg=#6C7086] {name} "
#   tab_active    = "#[fg=#CDD6F4,bold,italic] {name} "
#   tab_separator = "#[fg=#45475A]"   (no glyph)
set -g status on
set -g status 2                                 # two stacked rows
set -g status-position top                      # both rows at top of screen
set -g status-style "bg=default,fg=#CDD6F4"
set -g status-justify left
set -g status-left-length 200
set -g status-right-length 80
set -g status-interval 1                       # mode indicator updates fast

# Row 0 (topmost line of screen) — the global bar: sessions strip on
# the left, listening-port count + clickable kill-menu on the right,
# room in the middle for AI fleet counts when those land. Index 0 is
# rendered above index 1 with status-position top, which is what
# anchors "global on top, windows below."
set -g 'status-format[0]' '#[align=left,fg=#CDD6F4] #(~/.config/tmux/tmux-sessions-strip.sh #{q:client_session} 2>/dev/null) #[align=right]#{E:agent_widget}#{E:mosaic_widget}#[fg=#6C7086]#[range=user|tmux_ports]#(~/.config/tmux/tmux-ports.sh count 2>/dev/null)#[norange]#{E:sep}#(~/.config/tmux/tmux-fleet.sh 2>/dev/null)#{E:sep}#{E:mode_indicator} '

# Row 1 — manual reconstruction of tmux's default status-format
# (status-left + windows iterator + status-right). We have to spell
# this out because once `status-format[0]` is set explicitly, the
# implicit default that tmux applies to row 0 doesn't carry over to
# row 1 — and we want the existing windows / mode chrome to live on
# this row, just below the global bar.
#
# Windows are rendered by `tmux-windows-strip.sh` instead of `#{W:…}`
# because `#{W:}` per-iteration `window_active` binding is broken in
# our tmux build — only the first-indexed window picks up the active
# style, regardless of which is actually focused. The shell helper
# uses `tmux list-windows -F` (which DOES bind window context per
# iteration server-side) and emits already-styled segments.
set -g 'status-format[1]' '#[align=left]#{T:status-left}#[align=#{status-justify}]#(~/.config/tmux/tmux-windows-strip.sh #{q:client_session} 2>/dev/null)#[align=right]#{T:status-right}'

set -g mode-style    "bg=#45475A,fg=#CDD6F4"
set -g message-style "bg=#1E1E2E,fg=#CDD6F4"

# copy-mode (scroll mode) match highlighting. All matches glow Catppuccin
# yellow on surface1 grey; the *current* match (= where the cursor is)
# inverts to bold dark text on a yellow block — doubles as a strong cursor
# indicator on top of the cursor-style hook below.
set -g copy-mode-match-style         "bg=#45475A,fg=#F9E2AF"
set -g copy-mode-current-match-style "bg=#F9E2AF,fg=#1E1E2E,bold"

# Beefier cursor while in copy-mode: switch to a block-style yellow cursor
# on entry, restore defaults on exit. Hook fires once per mode transition;
# `pane-mode-changed` is tmux ≥ 3.4. Server-level cursor options only take
# effect when tmux owns the cursor (i.e. copy-mode), so other panes are
# unaffected.
set-hook -g pane-mode-changed {
  if-shell -F '#{==:#{pane_mode},copy-mode}' \
    'set -s cursor-style block ; set -s cursor-colour "#F9E2AF"' \
    'set -s cursor-style default ; set -s cursor-colour default'
}

# Popup styling — without this, display-popup opens with terminal-default
# attributes for a frame before its inner command paints, causing a visible
# white flash on Ctrl+/ etc. (cf. tmux #2776, #3655). Match Catppuccin Mocha.
set -g popup-style        "bg=#1E1E2E,fg=#CDD6F4"
set -g popup-border-style "fg=#45475A"
set -g popup-border-lines rounded

# Tab list (#W only — no index, matches zjstatus {name}).
#
# Tab badges — generic slot infrastructure for per-window glyphs. The
# window NAME stays bare (slugify-title.py only handles text); icons
# render here from tmux state, so any caller that wants a glyph just
# sets the corresponding option (or relies on a built-in flag) and the
# badge appears within status-interval (1s). Hooks no longer rename the
# window to refresh icons.
#
# Add a new badge by extending the priority chain in the appropriate
# sub-template (@tab-transient / @tab-working / @tab-persistent /
# @tab-monitored). Glyphs are 4-byte Plane-15 codepoints — Edit/Write
# silently strips 3-byte PUA (most nf-cod-*/nf-fa-*); see CLAUDE.md.
#
# Badge slot — right of the name; one glyph; sourced from four
# categories with distinct active-window semantics:
#
#   @tab-transient — actionable; cleared by external trigger (focus or
#       another action). NEVER renders on the active window: a transient
#       badge exists to drag your attention to a tab you aren't looking
#       at, and gating it at the format level frees individual setters
#       (Claude hooks, TUI bells) from having to do the active-window
#       check themselves. Otherwise focused-pane bells would strand a
#       glyph on the current tab until you tab-cycled away and back.
#     @agent-done          bell-ring    nf-md-bell_ring    U+F009E  agent awaits reply
#     window_bell_flag     bell         nf-md-bell         U+F009A  TUI hardware bell
#                                                          (tracked window-level —
#                                                          one Claude per window
#                                                          means a count would be
#                                                          noise; a glyph is enough)
#
#   @tab-working — agent in-progress; renders on active and non-active
#       windows alike. Derived live from #{pane_title}: Claude Code paints
#       the OSC title with a Braille spinner glyph (⠂ ⠁ ⠄ …) while a turn
#       is in flight and a sparkle (✳) once the agent is idle / awaiting
#       input. Reading the title means cancellation is detected the moment
#       Claude rewrites it — no hook, no TTL, no flag bookkeeping. Gated
#       on `pane_current_command == claude` so unrelated panes whose
#       titles happen to start with non-✳ chars don't false-positive.
#     #{pane_title} ≁ "✳ *"  hourglass    nf-md-timer_sand   U+F051F  agent is working on a turn
#
#   @tab-persistent — state worth seeing on every window including the
#       active one (sync is a footgun warning, zoom changes layout).
#     pane_synchronized    broadcast    nf-md-broadcast    U+F1720  synchronize-panes ON — keystroke hazard
#     window_marked_flag   pin          nf-md-pin          U+F0403  pane marked for swap-pane / move-pane
#     window_zoomed_flag   fullscreen   nf-md-fullscreen   U+F0293  pane is zoomed
#
#   @tab-monitored — opt-in background-output watching. tmux only sets
#       these flags on non-active windows by design (clears on focus);
#       the format also gates them away from the active branch as
#       defense in depth. Enable per window:
#         tmux set-window-option monitor-activity on
#         tmux set-window-option monitor-silence  30
#     window_activity_flag eye          nf-md-eye          U+F0208  output happened in background window
#     window_silence_flag  sleep        nf-md-sleep        U+F04B2  no output for N sec
#
# Composition (bell precedence — bells win over everything):
#   any window        →  @tab-transient (bell / agent-done) wins if non-empty
#   else active       →  @tab-working > @tab-persistent
#   else non-active   →  @tab-working > @tab-persistent > @tab-monitored
set -g @tab-transient  '#{?#{@agent-done}, 󰂞,#{?window_bell_flag, 󰂚,}}'
#
# Window-wide AND deduplicated: `#{P:…}` iterates panes and
# concatenates a marker `X` for each waiting Claude pane; the outer
# `#{?…}` then emits ONE ` 󰔟` if any pane matched, regardless of how
# many. Three Claude panes waiting → still one glyph. Switching
# panes inside the window doesn't change the badge. Bell glyph
# (@tab-transient) takes precedence over this in @tab-badge so
# bells win during the moment they exist.
set -g @tab-working    '#{?#{P:#{?#{==:#{pane_current_command},claude},#{?#{m:✳*,#{pane_title}},,X},}}, 󰔟,}'
set -g @tab-persistent '#{?pane_synchronized, 󱜠,#{?window_marked_flag, 󰐃,#{?window_zoomed_flag, 󰊓,}}}'
set -g @tab-monitored  '#{?window_activity_flag, 󰈈,#{?window_silence_flag, 󰒲,}}'
set -g @tab-badge      '#{?#{E:@tab-transient},#{E:@tab-transient},#{?window_active,#{?#{E:@tab-working},#{E:@tab-working},#{E:@tab-persistent}},#{?#{E:@tab-working},#{E:@tab-working},#{?#{E:@tab-persistent},#{E:@tab-persistent},#{E:@tab-monitored}}}}}'

set -g window-status-format         "#[fg=#6C7086] #W#{E:@tab-badge} "
set -g window-status-current-format "#[fg=#89B4FA,bold,italic] #W#{E:@tab-badge} "
set -g window-status-separator      ""

# Left segment — leading space + bold blue session + space, then tabs.
set -g status-left ""

# Right segment — agent indicator + transient flash + mosaic + mode badge.
#
# Agent segment renders only when @agent-action is set on the focused
# window (driven by ~/.claude/agent-action-hook.sh). Catppuccin mauve
# glyph keeps it visually distinct from the green pane-mode badge.
#
# === Flash widget — generic transient status banner ========================
# Replacement for `display-message` toasts. Single-verb invocation from
# any binding: `flash <markup>`. The badge shows up in the top-right
# status segment alongside the mode/mosaic indicators.
#
#   bind -T prefix x flash "#[fg=#A6E3A1]✓ saved"
#   bind -T prefix X flash "#[fg=#F38BA8]✗ build failed"
#
# Multi-step bindings use `\;`-separated form, NOT a `{...}` block —
# `command-alias` resolves at command-dispatch time, but `{...}` parses
# strictly at bind time and rejects custom verbs (tmux 3.5a behaviour):
#
#   bind -T prefix r \
#       source-file ~/.config/tmux/tmux.conf \;\
#       run-shell -b "mosaic reconcile" \;\
#       flash "#[fg=#A6E3A1]↻ reloaded"
#
# Wire-protocol — three options scoped to the FIRING SESSION (no `-g`,
# so a flash on one session doesn't leak into a sibling on the same
# server). The `flash` alias writes the first two; set them directly if
# `flash` isn't handy (e.g. from a shell hook):
#
#   @flash_text     pre-formatted markup (e.g. "#[fg=##A6E3A1]✓ saved")
#   @flash_set_at   unix epoch seconds at the time of publishing
#   @flash_ttl      seconds to remain visible (defaults to 5 if unset)
#
# Override the TTL inline via `set @flash_ttl 8` in the same binding
# body. From a shell with no client context (e.g. cron), target the
# session explicitly: `tmux set-option -t <session> @flash_text "..."`.
#
# The widget reads `#{client_activity}` as `now` — tmux's integer
# timestamp of the last client input. With `status-interval 1` and any
# user activity in the last second the math is current; if you go fully
# idle it stalls (the badge persists past TTL until next keypress), but
# idle users aren't watching the bar anyway. `#{e|-:a,b}` is integer
# math; `#{<:a,b}` is "a < b"; `#{||:a,b}` is logical OR.
#
# === Mosaic segment — transient action badge ==============================
# Reads raw `@mosaic_*` state published by rlch/mosaic's runner. Visible
# while an action runs (`@mosaic_status` == running) AND for `@flash_ttl`
# seconds after it completes (using `@mosaic_completed_at`). Colored dot:
# yellow=running, green=ok, red=fail/timeout/error. Then action name,
# step `[N/M]` mid-multi-step, and description if declared.
#
# This block exists in the dotfiles, not the plugin — the plugin only
# publishes raw vars; rendering + transience is a DX choice.
#
# Mode badge nested ternaries are ugly but reliable.

# Reusable subexpressions, named via setenv for readability. `-h` keeps
# them out of children's environments. `#{E:name}` expands them.
#
# `#{<:a,b}` is lexicographic in tmux 3.6 ("10" < "5" yields 1), so the
# "is diff still under TTL?" check uses sign-of-(diff - TTL) instead:
# `#{m:-*,N}` returns 1 iff N starts with `-` (i.e., N is negative).
setenv -hg flash_now '#{client_activity}'
setenv -hg flash_ttl_or_default '#{?@flash_ttl,#{T:@flash_ttl},5}'
# Within-TTL check: 1 iff (now - set_at - ttl) is negative, i.e., diff < ttl.
setenv -hg flash_within_ttl '#{m:-*,#{e|-:#{e|-:#{E:flash_now},#{T:@flash_set_at}},#{E:flash_ttl_or_default}}}'
setenv -hg flash_widget '#{?@flash_text,#{?#{E:flash_within_ttl},#{T:@flash_text} ,},}'

# `flash <markup>` — single-verb toast. Expands to `set @flash_set_at`
# (timestamp first, so the TTL countdown starts before the text appears)
# `;` `set @flash_text` (the user's arg appends here, since `command-alias`
# tacks remaining args onto the END of the expansion). One call, both
# globals updated, no `run-shell`.
#
# No `-g`: scoped to the firing client's session, so a flash in one
# session never bleeds into a sibling on the same server (same reason
# `@mosaic_*` is per-session). `-F` expands the format at set-time;
# `client_activity` is the most recent input epoch, fresh enough.
#
# Usage from any binding (must use `\;`-separated form, NOT `{...}`,
# because command-alias resolves at dispatch and `{...}` parses strictly
# at bind time):
#
#   bind -T prefix x flash "#[fg=#A6E3A1]✓ saved"
set -s command-alias[100] 'flash=set -F @flash_set_at "#{client_activity}" ; set @flash_text'
# Mosaic: visible while running OR within TTL of completion.
setenv -hg mosaic_within_ttl '#{?@mosaic_completed_at,#{m:-*,#{e|-:#{e|-:#{E:flash_now},#{T:@mosaic_completed_at}},#{E:flash_ttl_or_default}}},0}'
setenv -hg mosaic_visible '#{||:#{==:#{T:@mosaic_status},running},#{E:mosaic_within_ttl}}'
setenv -hg mosaic_dot_color '#{?#{==:#{T:@mosaic_status},running},##F9E2AF,#{?#{==:#{T:@mosaic_status},ok},##A6E3A1,##F38BA8}}'
setenv -hg mosaic_widget '#{?@mosaic_action,#{?#{E:mosaic_visible},#[fg=#{E:mosaic_dot_color}]● #[fg=##CDD6F4]#{T:@mosaic_action}#{?@mosaic_step, [#{T:@mosaic_step}],}#{?@mosaic_action_description, — #{T:@mosaic_action_description},} #[default],},}'

# Mode indicator — every mode owns ONE setenv that defines its
# `style + glyph` pair. `mode_indicator` is just the dispatch chain,
# `client_prefix` first (C-Space prefix held), then the per-table
# matches in priority order, falling through to `mode_root`. To add a
# mode: add a new `mode_<name>` setenv and one branch in the chain.
# To re-style a mode: edit only its setenv. No need to touch the
# dispatch.
setenv -hg mode_root    '#[fg=##89B4FA,bold]󰫻'   # alpha_n — Normal
setenv -hg mode_prefix  '#[fg=##CBA6F7,bold]󰌓'   # keyboard_variant — leader held
setenv -hg mode_copy    '#[fg=##F9E2AF,bold]'   # scroll — scrollback/select
setenv -hg mode_pane    '#[fg=##A6E3A1,bold]󰋁'   # grid — split panes
setenv -hg mode_tab     '#[fg=##FAB387,bold]󰓩'   # tab — windows
setenv -hg mode_resize  '#[fg=##94E2D5,bold]󰁌'   # arrow_expand_all — resize
setenv -hg mode_move    '#[fg=##FAE3B0,bold]󰆾'   # cursor_move — rearrange
setenv -hg mode_session '#[fg=##F5C2E7,bold]󰒋'   # server — sessions
setenv -hg mode_indicator '#{?#{==:#{pane_mode},copy-mode},#{E:mode_copy},#{?#{==:#{client_key_table},prefix},#{E:mode_prefix},#{?#{==:#{client_key_table},pane},#{E:mode_pane},#{?#{==:#{client_key_table},tab},#{E:mode_tab},#{?#{==:#{client_key_table},resize},#{E:mode_resize},#{?#{==:#{client_key_table},move},#{E:mode_move},#{?#{==:#{client_key_table},session},#{E:mode_session},#{E:mode_root}}}}}}}}'

# Agent action segment — visible on row 0 right when Claude has set
# `@agent-action` on the active pane.
setenv -hg agent_widget '#{?#{@agent-action},#[fg=##CBA6F7]󰙴 #[fg=##CDD6F4]#{@agent-action} #[default],}'

# Segment separator — single source of truth for the dim divider that
# sits between segments on row 0's right side. Self-contained:
# leading + trailing spaces are inside the variable, so changing the
# glyph or color here doesn't require touching status-format. To swap
# look, edit ONLY this line (e.g. │ → · → ╵ → ▏).
setenv -hg sep ' #[fg=##45475A]│#[default] '

set -g status-right "#{E:flash_widget}"

# === Keybinds ==============================================================
# Wipe prefix + copy-mode tables; root left intact for default mouse handling.
unbind-key -a -T prefix
unbind-key -a -T copy-mode
unbind-key -a -T copy-mode-vi

# --- Root: NORMAL mode shortcuts (no prefix) ------------------------------
# Cmd+1..9 → window N (zellij GoToTab N). Ghostty intercepts cmd+digit and
# emits CSI-u modifier-5 (ctrl) so tmux still sees C-N here — see ghostty
# config for the masquerade. Press ctrl+digit and nothing happens; cmd is
# the trigger.
bind -T root C-1 select-window -t :=1
bind -T root C-2 select-window -t :=2
bind -T root C-3 select-window -t :=3
bind -T root C-4 select-window -t :=4
bind -T root C-5 select-window -t :=5
bind -T root C-6 select-window -t :=6
bind -T root C-7 select-window -t :=7
bind -T root C-8 select-window -t :=8
bind -T root C-9 select-window -t :=9

# Ctrl+[ / Ctrl+] — jump prev/next window flagged with @agent-done (Claude's
# "awaiting reply" bell-ring) or window_bell_flag (TUI hardware bell). Both
# render as the bell glyph in the tab status. Shift variants span all
# sessions. Ghostty rebinds these to distinct CSI-u sequences so tmux can
# tell C-[ from ESC and C-S-] from C-]; see ghostty/config.
bind -T root C-]   run-shell -b "~/.config/tmux/jump-agent-done.sh next session"
bind -T root C-[   run-shell -b "~/.config/tmux/jump-agent-done.sh prev session"
bind -T root C-S-] run-shell -b "~/.config/tmux/jump-agent-done.sh next global"
bind -T root C-S-[ run-shell -b "~/.config/tmux/jump-agent-done.sh prev global"

# Status-bar click router — `mouse_status_range` carries either the
# native range type (`window` for `range=window|N`) or the user-tagged
# argument (e.g. `session:mosaic`, `tmux_ports`).
#
#   range == window      → fall through to `select-window -t =`
#                           (tmux's `{mouse}` target picks the clicked window)
#   range == session:*   → tmux-mouse-status.sh switch-client
#   range == tmux_ports  → tmux-mouse-status.sh open ports menu
#
# Why the helper instead of inline format substitution: tmux commands
# (switch-client, display-menu) do NOT expand `#{...}` formats in their
# argument strings — only `run-shell` does. So `switch-client -t
# '#{s/...:mouse_status_range}'` would try to find a session literally
# named `#{...}` and error. `run-shell` expands at its own layer, then
# the helper parses with bash.
bind -T root MouseDown1Status {
    if-shell -F '#{==:#{mouse_status_range},window}' {
        select-window -t =
    } {
        run-shell -b "~/.config/tmux/tmux-mouse-status.sh '#{q:mouse_status_range}'"
    }
}

# C-S-{1..9} → jump to the Nth session (alphabetical order). Stable
# across reconnects so long as no session is created/destroyed between
# presses. tmux-switch-session.sh handles out-of-range N silently.
bind -T root C-S-1 run-shell -b "~/.config/tmux/tmux-switch-session.sh 1"
bind -T root C-S-2 run-shell -b "~/.config/tmux/tmux-switch-session.sh 2"
bind -T root C-S-3 run-shell -b "~/.config/tmux/tmux-switch-session.sh 3"
bind -T root C-S-4 run-shell -b "~/.config/tmux/tmux-switch-session.sh 4"
bind -T root C-S-5 run-shell -b "~/.config/tmux/tmux-switch-session.sh 5"
bind -T root C-S-6 run-shell -b "~/.config/tmux/tmux-switch-session.sh 6"
bind -T root C-S-7 run-shell -b "~/.config/tmux/tmux-switch-session.sh 7"
bind -T root C-S-8 run-shell -b "~/.config/tmux/tmux-switch-session.sh 8"
bind -T root C-S-9 run-shell -b "~/.config/tmux/tmux-switch-session.sh 9"

# Tap-Left-Option in Ghostty fires `prefix Tab` (last-window) and
# Shift+Tap fires `prefix BSpace` (last-session). The Karabiner rule
# emitting these is "Ghostty: tap Left Option = tmux last-window …".
# Bound below the prefix wipe so they survive `unbind-key -a -T prefix`.

# Ctrl+/ → open choose-tree (window/session picker). Karabiner remaps the
# Mission Control button + F3 → Ctrl+/ when Ghostty is frontmost, so this
# is the user's "open the switcher" key. Pressing it AGAIN while choose-tree
# is open dismisses the picker AND switches to the last-active window — so
# Mission-Control-twice acts as quick alt-tab without leaving the picker
# stuck open. See the choose-tree binding below.
# Runs inline as a client-mode (like copy-mode), not a popup — popup wrapper
# spawns a shell, adding a 50-200ms paint flash before choose-tree renders.
# C-_ kept as a Ghostty-extkeys-off fallback.
bind -T root C-/ choose-tree -Zs
bind -T root C-_ choose-tree -Zs

# Inside choose-tree: second Ctrl+/ press cancels the picker and swaps to
# the last-active window (so the user-perceived behaviour is a one-press
# alt-tab when the picker isn't open, and a two-press alt-tab when it is).
#
# choose-tree's input goes through `copy-mode-vi` (because `mode-keys vi`
# is set) — tmux's own q/Escape/Enter cancel bindings live there too,
# not in the `choose-tree` table. The mirror C-_ binding handles the case
# where Ghostty extkeys are off and C-/ collapses to C-_.
#
# Same binding fires in actual copy-mode too (browsing scrollback). That's
# acceptable: the Mission Control button means "switch context", whether
# context = picker or = scroll buffer.

# Ctrl+Y → yazi popup over the focused pane's directory. Triggered by
# the Spotlight key (F4 / apple_vendor `spotlight` / `launchpad`):
# Karabiner remaps the spotlight keycode to Ctrl+Y when Ghostty is
# frontmost (and to Cmd+Space → Raycast otherwise); Ghostty's
# `keybind = ctrl+y=csi:121;5u` translates to CSI-u so tmux reads it
# as C-y. F-keys can't be remapped inside Ghostty cleanly, so we route
# through a Ctrl+letter combo — same pattern as the Ctrl+/ choose-tree
# binding above. Popup is 80% × 80%; -E exits popup when yazi quits.
#
# Why the nested `tmux new-session yazi`: tmux display-popup doesn't
# support DCS passthrough (yazi#2308 / tmux#4329), so yazi's DA1/DSR
# probes time out and the failure cascades into the outer server. By
# spawning a throwaway nested session inside the popup, yazi runs in a
# real pane — where passthrough works — while the outer session stays
# isolated from any yazi/passthrough crash. `set status off` hides the
# inner status bar so the popup looks like plain yazi.
#
# YAZI_OUTER_SESSION / YAZI_OUTER_PANE: capture the calling session+pane
# at popup-trigger time and bake them into the nested-session env, so
# yazi's tmux-integration keymaps (new-window / split-window) target the
# outer session — not the throwaway nested one that dies with yazi.
#
# Format strings (#{...}) are NOT expanded in `display-popup`'s shell-
# command argument when the binding fires from a keypress — they ARE
# expanded in `run-shell`'s argument string. So we route through
# run-shell, which then dispatches display-popup with the values already
# substituted as positional args to the wrapper.
bind -T root C-y run-shell -b "~/.config/yazi/yazi-popup.sh '#{pane_current_path}' '#{session_name}' '#{pane_id}'"

# Ctrl+Space → primary prefix. Activates which-key via Ctrl+Space, Space
# (the plugin's default <prefix>+Space binding). The default `prefix = C-b`
# would otherwise eat C-b before root-table bindings see it (tmux consumes
# the prefix key before resolving root bindings), breaking the modal scroll
# entry below — so we replace prefix outright and leave prefix2 unset.
set -g prefix C-Space
set -gu prefix2

# Mode entries from NORMAL.
bind -T root C-s switch-client -T pane
bind -T root C-a switch-client -T tab
bind -T root F3  switch-client -T tab
# If the focused pane is running Claude Code, forward C-b to it so its
# `ctrl+b → toggleTranscript` keybinding fires; otherwise behave as before
# and enter tmux's modal scroll (copy-mode). Match is a prefix glob so
# wrappers like `claude-code` still trigger the pass-through.
bind -T root C-b if-shell -F '#{m:claude*,#{pane_current_command}}' \
  'send-keys C-b' \
  'copy-mode'
bind -T root C-q switch-client -T session

# Mosaic which-key menu — bind directly on root table so `C-t` opens the
# action menu without going through the prefix (matches our modal style).
# The mosaic plugin's default binding lives on the `prefix` table; this
# replaces it. Pressing the key bound to a workspace action inside the
# menu fires the action and closes the menu.
#
# Gated on `@mosaic_session`, set by `mosaic open` on the session it
# creates. In other sessions C-t passes through to the active pane so
# the key isn't silently swallowed.
#
# `display-popup -E` is what gives the ratatui picker a real PTY; the
# previous `run-shell -b` runs detached with no controlling terminal,
# so the TUI cannot draw and the binary exits non-zero immediately.
# Pipe ↦ xargs dispatches the chosen action as fire-and-forget; on
# Esc the picker prints nothing, xargs sees no input, popup closes.
#
# Visual: borderless popup — `-B` suppresses tmux's frame so the
# picker's ratatui Block is the only border on screen (it draws its own
# `mosaic` title and counter, styled to match `popup-border-style`).
# `-x R -y P` pins the popup to the right of the pane (same anchor
# tmux-which-key uses); `-w 50 -h 22` keeps it tight to the menu rows
# instead of the default centred 50%×50%. Inner colours inherit from
# `popup-style` set above.
#
# Single-popup form: picker draws inside the popup (writing to /dev/tty,
# stdout free for the action name); on Enter the chosen path lands on
# stdout, xargs reads it and dispatches `mosaic action -i {} --background`
# inside the SAME popup pty so dialoguer's `/dev/tty` reads still hit
# real terminal input. `-r` makes xargs a no-op when stdin is empty so
# Esc (no output) closes silently.
#
# The previous two-stage form (popup → file → mosaic-pick.sh → second
# popup) was abandoned: tmux does NOT expand `#{pid}` inside
# `display-popup -E "shell-cmd"` when the binding fires from a keypress
# (it DOES inside `run-shell` — see the C-y/yazi binding above), so the
# picker wrote to a literal `/tmp/mosaic-picked-#{pid}` and stage 2
# never found the file. The trade-off accepted here: prompt popups
# inherit the picker's 22-row height, which is tall for a one-line
# dialoguer prompt but harmless. Re-introducing geometry-resize would
# need either a `run-shell -b "tmux display-popup ..."` wrapper that
# expands formats at the right time, or upstream tmux support for
# resizing a running popup.
bind -T root C-t if -F '#{@mosaic_session}' \
    "display-popup -B -x R -y P -w 50 -h 22 -E 'mosaic _menu | xargs -r -I {} mosaic action -i {} --background'" \
    'send-keys C-t'

# --- pane mode (Ctrl+s) ---------------------------------------------------
bind -T pane Left   { if -F '#{?pane_at_left,0,1}'   'select-pane -L'; switch-client -T pane }
bind -T pane Down   { if -F '#{?pane_at_bottom,0,1}' 'select-pane -D'; switch-client -T pane }
bind -T pane Up     { if -F '#{?pane_at_top,0,1}'    'select-pane -U'; switch-client -T pane }
bind -T pane Right  { if -F '#{?pane_at_right,0,1}'  'select-pane -R'; switch-client -T pane }
bind -T pane h      { if -F '#{?pane_at_left,0,1}'   'select-pane -L'; switch-client -T pane }
bind -T pane j      { if -F '#{?pane_at_bottom,0,1}' 'select-pane -D'; switch-client -T pane }
bind -T pane k      { if -F '#{?pane_at_top,0,1}'    'select-pane -U'; switch-client -T pane }
bind -T pane l      { if -F '#{?pane_at_right,0,1}'  'select-pane -R'; switch-client -T pane }

bind -T pane '['    { previous-layout; switch-client -T pane }   # PreviousSwapLayout
bind -T pane ']'    { next-layout;     switch-client -T pane }   # NextSwapLayout

bind -T pane c      command-prompt -p "Pane name:" "select-pane -T '%%' ; switch-client -T pane"
bind -T pane f      { resize-pane -Z; switch-client -T pane }               # ToggleFocusFullscreen
bind -T pane i      { display-message "TogglePanePinned: not supported in tmux" }
bind -T pane m      switch-client -T move
bind -T pane n      split-window -v -c "#{pane_current_path}"
bind -T pane p      { last-pane; switch-client -T pane }                    # FocusPreviousPane (stays)
bind -T pane Tab    { select-pane -t :.+; switch-client -T pane }           # SwitchFocus (stays)
bind -T pane r      switch-client -T resize
bind -T pane s      split-window -v -c "#{pane_current_path}"   # NewPane "down" (drops to root)
bind -T pane v      split-window -h -c "#{pane_current_path}"   # NewPane "right" (drops to root)
bind -T pane w      { display-message "ToggleFloatingPanes: not supported in tmux" }
bind -T pane x      { kill-pane; switch-client -T pane }                    # CloseFocus
bind -T pane z      {
                      if-shell -F '#{==:#{pane-border-status},off}' \
                        'set -wg pane-border-status top' \
                        'set -wg pane-border-status off'
                      switch-client -T pane
                    }

# Cross-mode jumps (zellij shared_except).
bind -T pane C-a switch-client -T tab
bind -T pane F3  switch-client -T tab
bind -T pane C-b copy-mode
bind -T pane C-q switch-client -T session

# --- tab mode (Ctrl+a / F3) -----------------------------------------------
bind -T tab Left   { previous-window; switch-client -T tab }
bind -T tab Down   { previous-window; switch-client -T tab }
bind -T tab Up     { next-window;     switch-client -T tab }
bind -T tab Right  { next-window;     switch-client -T tab }
bind -T tab h      { previous-window; switch-client -T tab }
bind -T tab j      { previous-window; switch-client -T tab }
bind -T tab k      { next-window;     switch-client -T tab }
bind -T tab l      { next-window;     switch-client -T tab }

bind -T tab 1 { select-window -t :=1; switch-client -T tab }
bind -T tab 2 { select-window -t :=2; switch-client -T tab }
bind -T tab 3 { select-window -t :=3; switch-client -T tab }
bind -T tab 4 { select-window -t :=4; switch-client -T tab }
bind -T tab 5 { select-window -t :=5; switch-client -T tab }
bind -T tab 6 { select-window -t :=6; switch-client -T tab }
bind -T tab 7 { select-window -t :=7; switch-client -T tab }
bind -T tab 8 { select-window -t :=8; switch-client -T tab }
bind -T tab 9 { select-window -t :=9; switch-client -T tab }

bind -T tab c      command-prompt -p "Tab name:" "rename-window '%%' ; switch-client -T tab"
bind -T tab s      { set-window-option synchronize-panes; switch-client -T tab }   # ToggleActiveSyncTab (stays)
bind -T tab x      { kill-window; switch-client -T tab }                            # CloseTab
bind -T tab Tab    { last-window; switch-client -T tab }                            # ToggleTab (stays)
bind -T tab H      { swap-window -d -t -1; switch-client -T tab }           # MoveTab Left
bind -T tab L      { swap-window -d -t +1; switch-client -T tab }           # MoveTab Right
bind -T tab n      new-window -c "#{pane_current_path}"   # shared NewTab (drops to root)

bind -T tab C-s switch-client -T pane
bind -T tab C-b copy-mode
bind -T tab C-q switch-client -T session

# --- resize mode (Ctrl+s, r) ----------------------------------------------
bind -T resize Left  { resize-pane -L 5; switch-client -T resize }
bind -T resize Down  { resize-pane -D 3; switch-client -T resize }
bind -T resize Up    { resize-pane -U 3; switch-client -T resize }
bind -T resize Right { resize-pane -R 5; switch-client -T resize }
bind -T resize h     { resize-pane -L 5; switch-client -T resize }
bind -T resize j     { resize-pane -D 3; switch-client -T resize }
bind -T resize k     { resize-pane -U 3; switch-client -T resize }
bind -T resize l     { resize-pane -R 5; switch-client -T resize }
bind -T resize +     { resize-pane -y +3; resize-pane -x +5; switch-client -T resize }
bind -T resize =     { resize-pane -y +3; resize-pane -x +5; switch-client -T resize }
bind -T resize -     { resize-pane -y -3; resize-pane -x -5; switch-client -T resize }

bind -T resize C-s switch-client -T pane
bind -T resize C-a switch-client -T tab
bind -T resize F3  switch-client -T tab
bind -T resize C-b copy-mode
bind -T resize C-q switch-client -T session

# --- move mode (Ctrl+s, m) ------------------------------------------------
bind -T move Left  { swap-pane -t '{left-of}';  switch-client -T move }
bind -T move Down  { swap-pane -t '{down-of}';  switch-client -T move }
bind -T move Up    { swap-pane -t '{up-of}';    switch-client -T move }
bind -T move Right { swap-pane -t '{right-of}'; switch-client -T move }
bind -T move h     { swap-pane -t '{left-of}';  switch-client -T move }
bind -T move j     { swap-pane -t '{down-of}';  switch-client -T move }
bind -T move k     { swap-pane -t '{up-of}';    switch-client -T move }
bind -T move l     { swap-pane -t '{right-of}'; switch-client -T move }
bind -T move n     { swap-pane -D; switch-client -T move }                  # MovePane next
bind -T move p     { swap-pane -U; switch-client -T move }                  # MovePaneBackwards
bind -T move Tab   { swap-pane -D; switch-client -T move }

bind -T move C-s switch-client -T pane
bind -T move C-a switch-client -T tab
bind -T move F3  switch-client -T tab
bind -T move C-b copy-mode
bind -T move C-q switch-client -T session

# --- session mode (Ctrl+q) ------------------------------------------------
bind -T session '/' choose-tree -Zs
bind -T session 'd' detach-client
bind -T session 'q' kill-session                                            # zellij Quit
bind -T session 'n' { new-window -c "#{pane_current_path}"; switch-client -T session }
bind -T session 'r' command-prompt -I "#S" -p "Session name:" "rename-session -- '%%' ; switch-client -T session"
bind -T session 'm' display-popup -E -w 80% -h 80% "tmux show-messages | nvim -R + -"

# hjkl — navigate between sessions; mirror of how Ctrl-a + hjkl walks
# windows. -p / -n step the previous/next session in tmux's session
# list (alphabetical). Re-enter the session table after each step so
# the modal feel persists.
bind -T session 'h' { switch-client -p; switch-client -T session }
bind -T session 'l' { switch-client -n; switch-client -T session }
bind -T session 'k' { switch-client -p; switch-client -T session }
bind -T session 'j' { switch-client -n; switch-client -T session }

bind -T session C-s switch-client -T pane
bind -T session C-a switch-client -T tab
bind -T session F3  switch-client -T tab
bind -T session C-b copy-mode

# --- copy-mode (Ctrl+b → scroll, with search) -----------------------------
# zellij scroll + entersearch + search collapse into tmux copy-mode-vi.
# Scroll keys: h/l = page, j/k = line — matches zellij PageScroll/Scroll.
bind -T copy-mode-vi h      send-keys -X page-up
bind -T copy-mode-vi j      send-keys -X scroll-down
bind -T copy-mode-vi k      send-keys -X scroll-up
bind -T copy-mode-vi l      send-keys -X page-down
bind -T copy-mode-vi Left   send-keys -X page-up
bind -T copy-mode-vi Down   send-keys -X scroll-down
bind -T copy-mode-vi Up     send-keys -X scroll-up
bind -T copy-mode-vi Right  send-keys -X page-down
bind -T copy-mode-vi d      send-keys -X halfpage-down
bind -T copy-mode-vi C-d    send-keys -X halfpage-down
bind -T copy-mode-vi u      send-keys -X halfpage-up
bind -T copy-mode-vi C-u    send-keys -X halfpage-up
bind -T copy-mode-vi C-b    send-keys -X cancel
bind -T copy-mode-vi C-c    { send-keys -X history-bottom; send-keys -X cancel }
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi q      send-keys -X cancel
bind -T copy-mode-vi Enter  send-keys -X cancel    # zellij: enter exits to normal

# Cross-mode jumps from copy-mode.
bind -T copy-mode-vi C-s    { send-keys -X cancel; switch-client -T pane }
bind -T copy-mode-vi C-a    { send-keys -X cancel; switch-client -T tab }
bind -T copy-mode-vi F3     { send-keys -X cancel; switch-client -T tab }
bind -T copy-mode-vi C-q    { send-keys -X cancel; switch-client -T session }
# C-/ (= Mission Control via Karabiner): exit mode + alt-tab. Fires in
# choose-tree (the picker uses this table) and copy-mode alike.
bind -T copy-mode-vi C-/    { send-keys -X cancel; last-window }
bind -T copy-mode-vi C-_    { send-keys -X cancel; last-window }

# Selection + copy → pbcopy (zellij copy_command "pbcopy").
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Search. `-i` makes the command-prompt incremental — matches highlight as
# you type, no Enter needed — and `*-incremental` keeps the cursor on the
# live match. `s`/`S` are the tmux-copy-toolkit leap bindings (set later);
# `/` and `?` are the vim-native search keys here.
bind -T copy-mode-vi / command-prompt -i -p "search ↓:" "send-keys -X search-forward-incremental '%%'"
bind -T copy-mode-vi ? command-prompt -i -p "search ↑:" "send-keys -X search-backward-incremental '%%'"
bind -T copy-mode-vi n send-keys -X search-again                            # vim n
bind -T copy-mode-vi N send-keys -X search-reverse                          # vim N
bind -T copy-mode-vi p send-keys -X search-reverse                          # zellij alias for N

# Vim-parity navigation. h/l (page) and j/k (line) stay zellij-style above;
# everything below is standard vim semantics so muscle memory carries over.
bind -T copy-mode-vi g    send-keys -X history-top
bind -T copy-mode-vi G    send-keys -X history-bottom
bind -T copy-mode-vi H    send-keys -X top-line
bind -T copy-mode-vi M    send-keys -X middle-line
bind -T copy-mode-vi L    send-keys -X bottom-line
bind -T copy-mode-vi 0    send-keys -X start-of-line
bind -T copy-mode-vi '$'  send-keys -X end-of-line
bind -T copy-mode-vi '^'  send-keys -X back-to-indentation
bind -T copy-mode-vi '{'  send-keys -X previous-paragraph
bind -T copy-mode-vi '}'  send-keys -X next-paragraph
bind -T copy-mode-vi w    send-keys -X next-word
bind -T copy-mode-vi b    send-keys -X previous-word
bind -T copy-mode-vi e    send-keys -X next-word-end
bind -T copy-mode-vi W    send-keys -X next-space
bind -T copy-mode-vi B    send-keys -X previous-space
bind -T copy-mode-vi E    send-keys -X next-space-end

# vim char-jump motions: f/F land ON the char, t/T land just before/after.
# `;`/`,` repeat the last jump. `command-prompt -1` reads exactly one
# keystroke (no Enter) — same UX as vim.
bind -T copy-mode-vi f    command-prompt -1 -p "(jump → )"  "send-keys -X jump-forward '%%'"
bind -T copy-mode-vi F    command-prompt -1 -p "(jump ← )"  "send-keys -X jump-backward '%%'"
bind -T copy-mode-vi t    command-prompt -1 -p "(till → )"  "send-keys -X jump-to-forward '%%'"
bind -T copy-mode-vi T    command-prompt -1 -p "(till ← )"  "send-keys -X jump-to-backward '%%'"
bind -T copy-mode-vi ';'  send-keys -X jump-again
bind -T copy-mode-vi ','  send-keys -X jump-reverse

# Swap cursor and anchor inside an active visual selection (vim `o`).
bind -T copy-mode-vi o    send-keys -X other-end

# Block (rectangle) selection toggle — for column-aligned data.
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# Yank whole line and exit (vim Y).
bind -T copy-mode-vi Y { send-keys -X select-line ; send-keys -X copy-pipe-and-cancel "pbcopy" }

# Search the word under the cursor (vim *, #). Guarded so we don't search
# for empty string when cursor is on whitespace.
bind -T copy-mode-vi '*' if-shell -F '#{!=:#{copy_cursor_word},}' 'send-keys -X search-forward "#{copy_cursor_word}"'
bind -T copy-mode-vi '#' if-shell -F '#{!=:#{copy_cursor_word},}' 'send-keys -X search-backward "#{copy_cursor_word}"'

# Mouse passthrough in copy-mode — pbcopy on drag-release, scroll-wheel pages.
bind -T copy-mode-vi MouseDown1Pane    select-pane
bind -T copy-mode-vi MouseDrag1Pane    send-keys -X begin-selection
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi WheelUpPane       send-keys -X scroll-up
bind -T copy-mode-vi WheelDownPane     send-keys -X scroll-down

# === Plugins (tpm) ========================================================
# Bootstrap script: .chezmoiscripts/run_onchange_post-install-tpm.sh.tmpl
# clones tpm and runs install_plugins on chezmoi apply.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'CrispyConductor/tmux-copy-toolkit'
set -g @plugin 'rlch/mosaic'                       # workspace runner + tmux integration

# tmux-which-key — discoverable menu of keys/modes. Activation is
# Ctrl+Space, Space (Ctrl+Space is set as prefix2 above; the plugin binds
# itself to <prefix>+Space).
# XDG-enable so config lives at ~/.config/tmux/which-key/ (deployable).
set -g @tmux-which-key-xdg-enable 'on'

# tmux-yank — copy without exiting copy-mode.
set -g @yank_with_mouse 'on'
set -g @yank_action 'copy-pipe-and-cancel'

# tmux-thumbs — letter-tap copy of URLs/paths/hashes (rust port of fingers).
set -g @thumbs-key f
set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-upcase-command 'echo -n {} | pbcopy && open {}'   # shift = open

# Custom hints, priority over the built-in URL/path/hash patterns. With
# no capture group, the whole match is the hint, so `f` then the letter
# copies the entire `claude --resume "…"` invocation — paste straight back
# into the shell to re-run.
#
# `\x22` is a literal-`"` escape (hex 22). tmux-thumbs parses options out
# of `tmux show -g` with `[^"]+`, so any `"` inside the value silently
# kills the line; the underlying Rust regex engine still resolves `\x22`
# back to `"` at match time. Same trick works for any other char that
# would otherwise need quoting.
set -g @thumbs-regexp-1 'claude (?:--resume|-r|--continue|-c) \x22[^\x22]+\x22'

# Tap-Left-Option chords (Karabiner emits prefix + Tab / prefix + BSpace).
bind -T prefix Tab    last-window
bind -T prefix BSpace switch-client -l

# Mosaic reconcile + source — single keystroke for "I edited my configs,
# pick up the changes": re-reads this tmux.conf (bindings, plugin defs,
# options) and non-destructively syncs the mosaic pane tree against the
# edited `.mosaic.yml`. Adds new panes, removes (or orphans) dropped ones,
# reorders matched panes without touching their state. Reconcile errors
# out cleanly outside a mosaic session.
bind -T prefix r \
    source-file ~/.config/tmux/tmux.conf \;\
    run-shell -b "mosaic reconcile" \;\
    flash "#[fg=#A6E3A1]↻ tmux.conf sourced; mosaic reconcile started"

# Edit scrollback in nvim popup, triggered from the prefix table (C-Space e).
# Lives outside copy-mode so `e` in copy-mode-vi can stay vim's next-word-end.
# `+` (no line number) lands cursor on the last line — popup opens scrolled
# to the bottom (freshest output). The perl strips the visible-pane padding
# (blank lines below the prompt) that capture-pane otherwise includes.
bind -T prefix e {
    capture-pane -S -
    save-buffer /tmp/tmux-scrollback.txt
    delete-buffer
    run-shell "perl -i -0777 -pe 's/\\s+\\z/\\n/' /tmp/tmux-scrollback.txt"
    display-popup -E -w 80% -h 80% "nvim -R + /tmp/tmux-scrollback.txt"
}

# tmux-copy-toolkit — leap-style label-jump for copy-mode. Defaults bind a
# bunch of <prefix>-rooted keys we don't want (and a `quickcopy` that
# duplicates thumbs), so we disable defaults and rebind only the copy-mode
# pieces below `run` (the plugin's binary lives at the rebound path).
set -g @copytk-no-default-binds on

run '~/.tmux/plugins/tpm/tpm'

# Copy-mode leap bindings — mirrors leap.nvim's `s` (1-char) / `S` (2-char):
# enter copy-mode, press `s` and one char to label every match, press the
# label to jump the cursor; `S` does the same with a 2-char pattern (more
# selective). From there, `v`/`y` for select+yank as usual.
bind -T copy-mode-vi s run-shell -b "python3 ~/.config/tmux/plugins/tmux-copy-toolkit/copytk.py easymotion-search --search-nkeys 1"
bind -T copy-mode-vi S run-shell -b "python3 ~/.config/tmux/plugins/tmux-copy-toolkit/copytk.py easymotion-search --search-nkeys 2"

# Copy the output of the last command to the clipboard (C-Space y). Lives
# below `run tpm` because tmux-yank otherwise binds prefix-y to copy-line.
# Captures the full scrollback, then copy-last-output.sh slices out the
# lines between the previous prompt and the current one (matched by
# starship's `λ`).
bind -T prefix y {
    capture-pane -S -
    save-buffer /tmp/tmux-last-output.txt
    delete-buffer
    run-shell "~/.config/tmux/copy-last-output.sh /tmp/tmux-last-output.txt"
    display-message "last output → clipboard"
}

# --- Overrides (after tmux-sensible, which would otherwise win) ----------
# Note: default-terminal is set at the top of this file too; tmux-sensible
# only forces it to "screen-256color" if unset, so the early `set -g` wins
# and we don't need to repeat it here.
set -g status-interval 1
set -g history-limit 20000

# Pane border title — focus indicator lives entirely in the title text
# colour, not the border line. pane-(active-)border-style is grey for both
# active and inactive panes (so the border line characters look identical
# everywhere); the focused pane is identified by its title segment going
# blue (#89B4FA). Inactive panes keep a dim grey title (#6C7086, matches
# the @<name> tag). Must run after `run tpm` because mosaic installs its
# own format at plugin load.
set -g pane-border-format '#{?#{E:mosaic_pane_running},#{E:mosaic_pane_running_badge},#{?pane_active,#[fg=#89B4FA] #{pane_title} ,#[fg=#6C7086] #{pane_title} }}#[align=right]#{E:mosaic_pane_tag}'
