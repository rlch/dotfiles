# tmux — modal Ctrl+s/Ctrl+a/Ctrl+b/Ctrl+q scheme, hjkl everywhere.
# Verbatim port of the prior zellij keymap + zjstatus look.
#
# Modes are custom key-tables. `switch-client -T <table>` enters; bindings
# inside re-enter the table to stay modal. Any unbound key auto-returns to
# root (≈ zellij's "esc/enter exits to normal").

# === General ================================================================
set -g default-shell "/opt/homebrew/bin/fish"
set -g default-terminal "tmux-256color"
set -as terminal-features 'xterm*:RGB'         # 24-bit truecolor
set -as terminal-features 'xterm*:extkeys'     # Ghostty CSI-u: distinct C-1..9, C-/
set -as terminal-features 'xterm*:sitm:ritm'   # italic (selected tab)
set -as terminal-features 'xterm*:usstyle'     # undercurl + colored underlines (LSP diags)
set -as terminal-features 'xterm*:hyperlinks'  # OSC 8 hyperlinks (yazi git, lazygit, etc.)

# Kitty graphics + sixel passthrough — lets yazi (and lazygit's previewers)
# push image bytes straight through tmux to Ghostty. tmux 3.6 forwards SIXEL
# natively but kitty-graphics still requires raw passthrough; allow-passthrough
# enables both. Yazi auto-detects passthrough and stops falling back to chafa.
set -g allow-passthrough on
set -as terminal-features 'xterm*:sixel'

# Forward TERM / TERM_PROGRAM into the server env on each client attach so
# display-popup ptys (which inherit server env, not the running pane's)
# carry the right terminal identity. Without this, yazi's DA1/DSR capability
# probes hit a popup with stale/missing TERM_PROGRAM, time out, and emit
# "Terminal response timeout" + "[server exited unexpectedly]". Detach +
# reattach is enough to refresh — no kill-server needed.
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -s extended-keys on
set -s extended-keys-format csi-u             # Ghostty speaks CSI-u, not modOtherKeys
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy on
set-window-option -g mode-keys vi

# Editor / pager — pin in tmux's global environment so children spawned by
# tmux (not just fish) see them, and so AI CLI tools that temporarily set
# GIT_EDITOR=true can't leave the server polluted across kill-server. Fish
# also exports these in config.fish, but explicit beats inherited.
set-environment -g EDITOR    nvim
set-environment -g VISUAL    nvim
set-environment -g GIT_EDITOR nvim
set-environment -g MANPAGER  'nvim +Man!'
# Refresh from each attaching client (default list is DISPLAY/SSH_*/etc.).
set -ga update-environment EDITOR
set -ga update-environment VISUAL
set -ga update-environment GIT_EDITOR
set -ga update-environment MANPAGER

# Let foreground programs (Claude Code, ssh, etc.) set the window title via
# OSC 0/2. tmux will reflect their escape sequence as the window name.
set -g allow-rename on
set -g automatic-rename off

# Auto-slugify long window names to <= 10 chars (Claude Code task summaries,
# long paths, etc.). Idempotent — second hook fire on our own rename exits
# early because slugify(slug) == slug. Also responsible for adding/removing
# the @agent prefix glyph and @agent-done suffix glyph.
set-hook -g window-renamed 'run-shell -b "~/.config/tmux/slugify-title.py #{window_id}"'

# Clear the "agent finished, awaiting reply" indicator the moment you focus
# the tab. @agent-done is set by ~/.claude/agent-done-hook.sh on Claude
# Code's Stop event; the bell suffix on the window name vanishes here.
set-hook -g pane-focus-in 'run-shell -b "~/.config/tmux/clear-agent-done.sh #{window_id}"'

# History — 20k lines per pane. Comfortable middle-ground above
# tmux-sensible's 50k default isn't needed here; 20k is enough for typical
# compile/test logs without bloating per-pane memory. Re-asserted after
# tmux-sensible at the bottom.
set -g history-limit 20000

# === Theme — catppuccin-mocha =============================================
# Borders.
set -g pane-border-style       "fg=#45475A"
set -g pane-active-border-style "fg=#89B4FA"
set -g pane-border-status off

# Status bar — zjstatus parity:
#   format_left   = " #[fg=#89B4FA,bold]{session}#[fg=#CDD6F4] {tabs}"
#   format_right  = "{mode} "
#   tab_normal    = "#[fg=#6C7086] {name} "
#   tab_active    = "#[fg=#CDD6F4,bold,italic] {name} "
#   tab_separator = "#[fg=#45475A]"   (no glyph)
set -g status on
set -g status-position top
set -g status-style "bg=default,fg=#CDD6F4"
set -g status-justify left
set -g status-left-length 200
set -g status-right-length 80
set -g status-interval 1                       # mode indicator updates fast

set -g mode-style    "bg=#45475A,fg=#CDD6F4"
set -g message-style "bg=#1E1E2E,fg=#CDD6F4"

# copy-mode (scroll mode) match highlighting. All matches glow Catppuccin
# yellow on surface1 grey; the *current* match (= where the cursor is)
# inverts to bold dark text on a yellow block — doubles as a strong cursor
# indicator on top of the cursor-style hook below.
set -g copy-mode-match-style         "bg=#45475A,fg=#F9E2AF"
set -g copy-mode-current-match-style "bg=#F9E2AF,fg=#1E1E2E,bold"

# Beefier cursor while in copy-mode: switch to a block-style yellow cursor
# on entry, restore defaults on exit. Hook fires once per mode transition;
# `pane-mode-changed` is tmux ≥ 3.4. Server-level cursor options only take
# effect when tmux owns the cursor (i.e. copy-mode), so other panes are
# unaffected.
set-hook -g pane-mode-changed {
  if-shell -F '#{==:#{pane_mode},copy-mode}' \
    'set -s cursor-style block ; set -s cursor-colour "#F9E2AF"' \
    'set -s cursor-style default ; set -s cursor-colour default'
}

# Popup styling — without this, display-popup opens with terminal-default
# attributes for a frame before its inner command paints, causing a visible
# white flash on Ctrl+/ etc. (cf. tmux #2776, #3655). Match Catppuccin Mocha.
set -g popup-style        "bg=#1E1E2E,fg=#CDD6F4"
set -g popup-border-style "fg=#45475A"
set -g popup-border-lines rounded

# Tab list (#W only — no index, matches zjstatus {name}).
set -g window-status-format         "#[fg=#6C7086] #W "
set -g window-status-current-format "#[fg=#CDD6F4,bold,italic] #W "
set -g window-status-separator      ""

# Left segment — leading space + bold blue session + space, then tabs.
set -g status-left " #[fg=#89B4FA,bold]#S#[fg=#CDD6F4] "

# Right segment — agent indicator (left) + mode badge (right). Agent
# segment renders only when @agent-action is set on the focused window
# (driven by ~/.claude/agent-action-hook.sh). Catppuccin mauve for the
# glyph keeps it visually distinct from the green pane-mode badge.
# Mode badge nested ternaries are ugly but reliable.
set -g status-right "#{?#{@agent-action},#[fg=#CBA6F7]󰙴 #[fg=#CDD6F4]#{@agent-action} #[default],}#{?#{==:#{pane_mode},copy-mode},#[fg=#F9E2AF#,bold],#{?#{==:#{client_key_table},pane},#[fg=#A6E3A1#,bold],#{?#{==:#{client_key_table},tab},#[fg=#FAB387#,bold]󰓩,#{?#{==:#{client_key_table},resize},#[fg=#94E2D5#,bold]󰁌,#{?#{==:#{client_key_table},move},#[fg=#FAE3B0#,bold],#{?#{==:#{client_key_table},session},#[fg=#F5C2E7#,bold],#[fg=#89B4FA#,bold]}}}}}} "

# === Keybinds ==============================================================
# Wipe prefix + copy-mode tables; root left intact for default mouse handling.
unbind-key -a -T prefix
unbind-key -a -T copy-mode
unbind-key -a -T copy-mode-vi

# --- Root: NORMAL mode shortcuts (no prefix) ------------------------------
# Cmd+1..9 → window N (zellij GoToTab N). Ghostty intercepts cmd+digit and
# emits CSI-u modifier-5 (ctrl) so tmux still sees C-N here — see ghostty
# config for the masquerade. Press ctrl+digit and nothing happens; cmd is
# the trigger.
bind -T root C-1 select-window -t :=1
bind -T root C-2 select-window -t :=2
bind -T root C-3 select-window -t :=3
bind -T root C-4 select-window -t :=4
bind -T root C-5 select-window -t :=5
bind -T root C-6 select-window -t :=6
bind -T root C-7 select-window -t :=7
bind -T root C-8 select-window -t :=8
bind -T root C-9 select-window -t :=9

# Ctrl+/ → session/window picker via tmux's built-in choose-tree mode.
# Runs inline as a client-mode (like copy-mode), not a popup — popup wrapper
# spawns a shell, adding a 50-200ms paint flash before choose-tree renders.
# C-_ kept as a Ghostty-extkeys-off fallback.
bind -T root C-/ choose-tree -Zs
bind -T root C-_ choose-tree -Zs

# Ctrl+Y → yazi popup over the focused pane's directory. Triggered by
# the Spotlight key (F4 / apple_vendor `spotlight` / `launchpad`):
# Karabiner remaps the spotlight keycode to Ctrl+Y when Ghostty is
# frontmost (and to Cmd+Space → Raycast otherwise); Ghostty's
# `keybind = ctrl+y=csi:121;5u` translates to CSI-u so tmux reads it
# as C-y. F-keys can't be remapped inside Ghostty cleanly, so we route
# through a Ctrl+letter combo — same pattern as the Ctrl+/ choose-tree
# binding above. Popup is 80% × 80%; -E exits popup when yazi quits.
#
# Why the nested `tmux new-session yazi`: tmux display-popup doesn't
# support DCS passthrough (yazi#2308 / tmux#4329), so yazi's DA1/DSR
# probes time out and the failure cascades into the outer server. By
# spawning a throwaway nested session inside the popup, yazi runs in a
# real pane — where passthrough works — while the outer session stays
# isolated from any yazi/passthrough crash. `set status off` hides the
# inner status bar so the popup looks like plain yazi.
#
# YAZI_OUTER_SESSION / YAZI_OUTER_PANE: capture the calling session+pane
# at popup-trigger time and bake them into the nested-session env, so
# yazi's tmux-integration keymaps (new-window / split-window) target the
# outer session — not the throwaway nested one that dies with yazi.
#
# Format strings (#{...}) are NOT expanded in `display-popup`'s shell-
# command argument when the binding fires from a keypress — they ARE
# expanded in `run-shell`'s argument string. So we route through
# run-shell, which then dispatches display-popup with the values already
# substituted as positional args to the wrapper.
bind -T root C-y run-shell -b "~/.config/yazi/yazi-popup.sh '#{pane_current_path}' '#{session_name}' '#{pane_id}'"

# Ctrl+Space → primary prefix. Activates which-key via Ctrl+Space, Space
# (the plugin's default <prefix>+Space binding). The default `prefix = C-b`
# would otherwise eat C-b before root-table bindings see it (tmux consumes
# the prefix key before resolving root bindings), breaking the modal scroll
# entry below — so we replace prefix outright and leave prefix2 unset.
set -g prefix C-Space
set -gu prefix2

# Mode entries from NORMAL.
bind -T root C-s switch-client -T pane
bind -T root C-a switch-client -T tab
bind -T root F3  switch-client -T tab
# If the focused pane is running Claude Code, forward C-b to it so its
# `ctrl+b → toggleTranscript` keybinding fires; otherwise behave as before
# and enter tmux's modal scroll (copy-mode). Match is a prefix glob so
# wrappers like `claude-code` still trigger the pass-through.
bind -T root C-b if-shell -F '#{m:claude*,#{pane_current_command}}' \
  'send-keys C-b' \
  'copy-mode'
bind -T root C-q switch-client -T session

# --- pane mode (Ctrl+s) ---------------------------------------------------
bind -T pane Left   { if -F '#{?pane_at_left,0,1}'   'select-pane -L'; switch-client -T pane }
bind -T pane Down   { if -F '#{?pane_at_bottom,0,1}' 'select-pane -D'; switch-client -T pane }
bind -T pane Up     { if -F '#{?pane_at_top,0,1}'    'select-pane -U'; switch-client -T pane }
bind -T pane Right  { if -F '#{?pane_at_right,0,1}'  'select-pane -R'; switch-client -T pane }
bind -T pane h      { if -F '#{?pane_at_left,0,1}'   'select-pane -L'; switch-client -T pane }
bind -T pane j      { if -F '#{?pane_at_bottom,0,1}' 'select-pane -D'; switch-client -T pane }
bind -T pane k      { if -F '#{?pane_at_top,0,1}'    'select-pane -U'; switch-client -T pane }
bind -T pane l      { if -F '#{?pane_at_right,0,1}'  'select-pane -R'; switch-client -T pane }

bind -T pane '['    { previous-layout; switch-client -T pane }   # PreviousSwapLayout
bind -T pane ']'    { next-layout;     switch-client -T pane }   # NextSwapLayout

bind -T pane c      command-prompt -p "Pane name:" "select-pane -T '%%' ; switch-client -T pane"
bind -T pane f      { resize-pane -Z; switch-client -T pane }               # ToggleFocusFullscreen
bind -T pane i      { display-message "TogglePanePinned: not supported in tmux" }
bind -T pane m      switch-client -T move
bind -T pane n      split-window -v -c "#{pane_current_path}"
bind -T pane p      { last-pane; switch-client -T pane }                    # FocusPreviousPane (stays)
bind -T pane Tab    { select-pane -t :.+; switch-client -T pane }           # SwitchFocus (stays)
bind -T pane r      switch-client -T resize
bind -T pane s      split-window -v -c "#{pane_current_path}"   # NewPane "down" (drops to root)
bind -T pane v      split-window -h -c "#{pane_current_path}"   # NewPane "right" (drops to root)
bind -T pane w      { display-message "ToggleFloatingPanes: not supported in tmux" }
bind -T pane x      { kill-pane; switch-client -T pane }                    # CloseFocus
bind -T pane z      {
                      if-shell -F '#{==:#{pane-border-status},off}' \
                        'set -wg pane-border-status top' \
                        'set -wg pane-border-status off'
                      switch-client -T pane
                    }

# Cross-mode jumps (zellij shared_except).
bind -T pane C-a switch-client -T tab
bind -T pane F3  switch-client -T tab
bind -T pane C-b copy-mode
bind -T pane C-q switch-client -T session

# --- tab mode (Ctrl+a / F3) -----------------------------------------------
bind -T tab Left   { previous-window; switch-client -T tab }
bind -T tab Down   { previous-window; switch-client -T tab }
bind -T tab Up     { next-window;     switch-client -T tab }
bind -T tab Right  { next-window;     switch-client -T tab }
bind -T tab h      { previous-window; switch-client -T tab }
bind -T tab j      { previous-window; switch-client -T tab }
bind -T tab k      { next-window;     switch-client -T tab }
bind -T tab l      { next-window;     switch-client -T tab }

bind -T tab 1 { select-window -t :=1; switch-client -T tab }
bind -T tab 2 { select-window -t :=2; switch-client -T tab }
bind -T tab 3 { select-window -t :=3; switch-client -T tab }
bind -T tab 4 { select-window -t :=4; switch-client -T tab }
bind -T tab 5 { select-window -t :=5; switch-client -T tab }
bind -T tab 6 { select-window -t :=6; switch-client -T tab }
bind -T tab 7 { select-window -t :=7; switch-client -T tab }
bind -T tab 8 { select-window -t :=8; switch-client -T tab }
bind -T tab 9 { select-window -t :=9; switch-client -T tab }

bind -T tab c      command-prompt -p "Tab name:" "rename-window '%%' ; switch-client -T tab"
bind -T tab s      { set-window-option synchronize-panes; switch-client -T tab }   # ToggleActiveSyncTab (stays)
bind -T tab x      { kill-window; switch-client -T tab }                            # CloseTab
bind -T tab Tab    { last-window; switch-client -T tab }                            # ToggleTab (stays)
bind -T tab H      { swap-window -d -t -1; switch-client -T tab }           # MoveTab Left
bind -T tab L      { swap-window -d -t +1; switch-client -T tab }           # MoveTab Right
bind -T tab n      new-window -c "#{pane_current_path}"   # shared NewTab (drops to root)

bind -T tab C-s switch-client -T pane
bind -T tab C-b copy-mode
bind -T tab C-q switch-client -T session

# --- resize mode (Ctrl+s, r) ----------------------------------------------
bind -T resize Left  { resize-pane -L 5; switch-client -T resize }
bind -T resize Down  { resize-pane -D 3; switch-client -T resize }
bind -T resize Up    { resize-pane -U 3; switch-client -T resize }
bind -T resize Right { resize-pane -R 5; switch-client -T resize }
bind -T resize h     { resize-pane -L 5; switch-client -T resize }
bind -T resize j     { resize-pane -D 3; switch-client -T resize }
bind -T resize k     { resize-pane -U 3; switch-client -T resize }
bind -T resize l     { resize-pane -R 5; switch-client -T resize }
bind -T resize +     { resize-pane -y +3; resize-pane -x +5; switch-client -T resize }
bind -T resize =     { resize-pane -y +3; resize-pane -x +5; switch-client -T resize }
bind -T resize -     { resize-pane -y -3; resize-pane -x -5; switch-client -T resize }

bind -T resize C-s switch-client -T pane
bind -T resize C-a switch-client -T tab
bind -T resize F3  switch-client -T tab
bind -T resize C-b copy-mode
bind -T resize C-q switch-client -T session

# --- move mode (Ctrl+s, m) ------------------------------------------------
bind -T move Left  { swap-pane -t '{left-of}';  switch-client -T move }
bind -T move Down  { swap-pane -t '{down-of}';  switch-client -T move }
bind -T move Up    { swap-pane -t '{up-of}';    switch-client -T move }
bind -T move Right { swap-pane -t '{right-of}'; switch-client -T move }
bind -T move h     { swap-pane -t '{left-of}';  switch-client -T move }
bind -T move j     { swap-pane -t '{down-of}';  switch-client -T move }
bind -T move k     { swap-pane -t '{up-of}';    switch-client -T move }
bind -T move l     { swap-pane -t '{right-of}'; switch-client -T move }
bind -T move n     { swap-pane -D; switch-client -T move }                  # MovePane next
bind -T move p     { swap-pane -U; switch-client -T move }                  # MovePaneBackwards
bind -T move Tab   { swap-pane -D; switch-client -T move }

bind -T move C-s switch-client -T pane
bind -T move C-a switch-client -T tab
bind -T move F3  switch-client -T tab
bind -T move C-b copy-mode
bind -T move C-q switch-client -T session

# --- session mode (Ctrl+q) ------------------------------------------------
bind -T session '/' choose-tree -Zs
bind -T session 'd' detach-client
bind -T session 'q' kill-session                                            # zellij Quit
bind -T session 'n' { new-window -c "#{pane_current_path}"; switch-client -T session }
bind -T session 'r' command-prompt -I "#S" -p "Session name:" "rename-session -- '%%' ; switch-client -T session"
bind -T session 'm' display-popup -E -w 80% -h 80% "tmux show-messages | nvim -R + -"

bind -T session C-s switch-client -T pane
bind -T session C-a switch-client -T tab
bind -T session F3  switch-client -T tab
bind -T session C-b copy-mode

# --- copy-mode (Ctrl+b → scroll, with search) -----------------------------
# zellij scroll + entersearch + search collapse into tmux copy-mode-vi.
# Scroll keys: h/l = page, j/k = line — matches zellij PageScroll/Scroll.
bind -T copy-mode-vi h      send-keys -X page-up
bind -T copy-mode-vi j      send-keys -X scroll-down
bind -T copy-mode-vi k      send-keys -X scroll-up
bind -T copy-mode-vi l      send-keys -X page-down
bind -T copy-mode-vi Left   send-keys -X page-up
bind -T copy-mode-vi Down   send-keys -X scroll-down
bind -T copy-mode-vi Up     send-keys -X scroll-up
bind -T copy-mode-vi Right  send-keys -X page-down
bind -T copy-mode-vi d      send-keys -X halfpage-down
bind -T copy-mode-vi C-d    send-keys -X halfpage-down
bind -T copy-mode-vi u      send-keys -X halfpage-up
bind -T copy-mode-vi C-u    send-keys -X halfpage-up
bind -T copy-mode-vi C-b    send-keys -X cancel
bind -T copy-mode-vi C-c    { send-keys -X history-bottom; send-keys -X cancel }
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi q      send-keys -X cancel
bind -T copy-mode-vi Enter  send-keys -X cancel    # zellij: enter exits to normal

# Cross-mode jumps from copy-mode.
bind -T copy-mode-vi C-s    { send-keys -X cancel; switch-client -T pane }
bind -T copy-mode-vi C-a    { send-keys -X cancel; switch-client -T tab }
bind -T copy-mode-vi F3     { send-keys -X cancel; switch-client -T tab }
bind -T copy-mode-vi C-q    { send-keys -X cancel; switch-client -T session }

# Selection + copy → pbcopy (zellij copy_command "pbcopy").
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Search. `-i` makes the command-prompt incremental — matches highlight as
# you type, no Enter needed — and `*-incremental` keeps the cursor on the
# live match. `s`/`S` are the tmux-copy-toolkit leap bindings (set later);
# `/` and `?` are the vim-native search keys here.
bind -T copy-mode-vi / command-prompt -i -p "search ↓:" "send-keys -X search-forward-incremental '%%'"
bind -T copy-mode-vi ? command-prompt -i -p "search ↑:" "send-keys -X search-backward-incremental '%%'"
bind -T copy-mode-vi n send-keys -X search-again                            # vim n
bind -T copy-mode-vi N send-keys -X search-reverse                          # vim N
bind -T copy-mode-vi p send-keys -X search-reverse                          # zellij alias for N

# Vim-parity navigation. h/l (page) and j/k (line) stay zellij-style above;
# everything below is standard vim semantics so muscle memory carries over.
bind -T copy-mode-vi g    send-keys -X history-top
bind -T copy-mode-vi G    send-keys -X history-bottom
bind -T copy-mode-vi H    send-keys -X top-line
bind -T copy-mode-vi M    send-keys -X middle-line
bind -T copy-mode-vi L    send-keys -X bottom-line
bind -T copy-mode-vi 0    send-keys -X start-of-line
bind -T copy-mode-vi '$'  send-keys -X end-of-line
bind -T copy-mode-vi '^'  send-keys -X back-to-indentation
bind -T copy-mode-vi '{'  send-keys -X previous-paragraph
bind -T copy-mode-vi '}'  send-keys -X next-paragraph
bind -T copy-mode-vi w    send-keys -X next-word
bind -T copy-mode-vi b    send-keys -X previous-word
bind -T copy-mode-vi e    send-keys -X next-word-end
bind -T copy-mode-vi W    send-keys -X next-space
bind -T copy-mode-vi B    send-keys -X previous-space
bind -T copy-mode-vi E    send-keys -X next-space-end

# vim char-jump motions: f/F land ON the char, t/T land just before/after.
# `;`/`,` repeat the last jump. `command-prompt -1` reads exactly one
# keystroke (no Enter) — same UX as vim.
bind -T copy-mode-vi f    command-prompt -1 -p "(jump → )"  "send-keys -X jump-forward '%%'"
bind -T copy-mode-vi F    command-prompt -1 -p "(jump ← )"  "send-keys -X jump-backward '%%'"
bind -T copy-mode-vi t    command-prompt -1 -p "(till → )"  "send-keys -X jump-to-forward '%%'"
bind -T copy-mode-vi T    command-prompt -1 -p "(till ← )"  "send-keys -X jump-to-backward '%%'"
bind -T copy-mode-vi ';'  send-keys -X jump-again
bind -T copy-mode-vi ','  send-keys -X jump-reverse

# Swap cursor and anchor inside an active visual selection (vim `o`).
bind -T copy-mode-vi o    send-keys -X other-end

# Block (rectangle) selection toggle — for column-aligned data.
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# Yank whole line and exit (vim Y).
bind -T copy-mode-vi Y { send-keys -X select-line ; send-keys -X copy-pipe-and-cancel "pbcopy" }

# Search the word under the cursor (vim *, #). Guarded so we don't search
# for empty string when cursor is on whitespace.
bind -T copy-mode-vi '*' if-shell -F '#{!=:#{copy_cursor_word},}' 'send-keys -X search-forward "#{copy_cursor_word}"'
bind -T copy-mode-vi '#' if-shell -F '#{!=:#{copy_cursor_word},}' 'send-keys -X search-backward "#{copy_cursor_word}"'

# Mouse passthrough in copy-mode — pbcopy on drag-release, scroll-wheel pages.
bind -T copy-mode-vi MouseDown1Pane    select-pane
bind -T copy-mode-vi MouseDrag1Pane    send-keys -X begin-selection
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi WheelUpPane       send-keys -X scroll-up
bind -T copy-mode-vi WheelDownPane     send-keys -X scroll-down

# === Plugins (tpm) ========================================================
# Bootstrap script: .chezmoiscripts/run_onchange_post-install-tpm.sh.tmpl
# clones tpm and runs install_plugins on chezmoi apply.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'CrispyConductor/tmux-copy-toolkit'

# tmux-which-key — discoverable menu of keys/modes. Activation is
# Ctrl+Space, Space (Ctrl+Space is set as prefix2 above; the plugin binds
# itself to <prefix>+Space).
# XDG-enable so config lives at ~/.config/tmux/which-key/ (deployable).
set -g @tmux-which-key-xdg-enable 'on'

# tmux-yank — copy without exiting copy-mode.
set -g @yank_with_mouse 'on'
set -g @yank_action 'copy-pipe-and-cancel'

# tmux-thumbs — letter-tap copy of URLs/paths/hashes (rust port of fingers).
set -g @thumbs-key f
set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-upcase-command 'echo -n {} | pbcopy && open {}'   # shift = open

# Custom hints, priority over the built-in URL/path/hash patterns. With
# no capture group, the whole match is the hint, so `f` then the letter
# copies the entire `claude --resume "…"` invocation — paste straight back
# into the shell to re-run.
#
# `\x22` is a literal-`"` escape (hex 22). tmux-thumbs parses options out
# of `tmux show -g` with `[^"]+`, so any `"` inside the value silently
# kills the line; the underlying Rust regex engine still resolves `\x22`
# back to `"` at match time. Same trick works for any other char that
# would otherwise need quoting.
set -g @thumbs-regexp-1 'claude (?:--resume|-r|--continue|-c) \x22[^\x22]+\x22'

# Edit scrollback in nvim popup, triggered from the prefix table (C-Space e).
# Lives outside copy-mode so `e` in copy-mode-vi can stay vim's next-word-end.
# `+` (no line number) lands cursor on the last line — popup opens scrolled
# to the bottom (freshest output).
bind -T prefix e {
    capture-pane -S -
    save-buffer /tmp/tmux-scrollback.txt
    delete-buffer
    display-popup -E -w 80% -h 80% "nvim -R + /tmp/tmux-scrollback.txt"
}

# tmux-copy-toolkit — leap-style label-jump for copy-mode. Defaults bind a
# bunch of <prefix>-rooted keys we don't want (and a `quickcopy` that
# duplicates thumbs), so we disable defaults and rebind only the copy-mode
# pieces below `run` (the plugin's binary lives at the rebound path).
set -g @copytk-no-default-binds on

run '~/.tmux/plugins/tpm/tpm'

# Copy-mode leap bindings — mirrors leap.nvim's `s` (1-char) / `S` (2-char):
# enter copy-mode, press `s` and one char to label every match, press the
# label to jump the cursor; `S` does the same with a 2-char pattern (more
# selective). From there, `v`/`y` for select+yank as usual.
bind -T copy-mode-vi s run-shell -b "python3 ~/.config/tmux/plugins/tmux-copy-toolkit/copytk.py easymotion-search --search-nkeys 1"
bind -T copy-mode-vi S run-shell -b "python3 ~/.config/tmux/plugins/tmux-copy-toolkit/copytk.py easymotion-search --search-nkeys 2"

# --- Overrides (after tmux-sensible, which would otherwise win) ----------
# Note: default-terminal is set at the top of this file too; tmux-sensible
# only forces it to "screen-256color" if unset, so the early `set -g` wins
# and we don't need to repeat it here.
set -g status-interval 1
set -g history-limit 20000
