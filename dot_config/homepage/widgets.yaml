---
# Header info widgets. The richer per-host monitor row (CPU/Network/Memory
# charts) is in services.yaml under "Mini Glances" so it gets card layout.

- datetime:
    text_size: xl
    format:
      timeStyle: short
      dateStyle: long
      hourCycle: h23

- search:
    provider: google
    target: _blank
    showSearchSuggestions: true

- openmeteo:
    label: Melbourne
    latitude: -37.8136
    longitude: 144.9631
    timezone: Australia/Melbourne
    units: metric
    cache: 5
