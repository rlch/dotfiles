# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json
#
# Diff strategy:
#   - Inline panel  → delta (streaming ANSI). revdiff is a TUI; it can't drive
#                     the small side-panel.
#   - <c-o> in any  → revdiff fullscreen on the current selection ("open"
#     diff context     externally). Annotations are written to
#                      ~/.config/revdiff/history/ on quit.
#   - <c-d>         → reserved for scrollDownMain (lazygit's alt2 default).

promptToReturnFromSubprocess: false

gui:
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  theme:
    activeBorderColor: ["#89b4fa", "bold"]
    inactiveBorderColor: ["#45475a"]
    selectedLineBgColor: ["#313244"]
    optionsTextColor: ["#89b4fa"]
    cherryPickedCommitBgColor: ["#f9e2af"]
    cherryPickedCommitFgColor: ["#1e1e2e"]
    unstagedChangesColor: ["#f38ba8"]

git:
  pagers:
    - colorArg: always
      pager: delta --paging=never --dark
  parseEmoji: false

customCommands:
  - key: "<c-o>"
    description: "Review the selected file in revdiff"
    context: "files"
    command: 'revdiff --only={{.SelectedFile.Name | quote}}'
    output: terminal

  - key: "<c-o>"
    description: "Review the selected commit in revdiff"
    context: "commits"
    command: 'revdiff {{.SelectedLocalCommit.Sha}}~1 {{.SelectedLocalCommit.Sha}}'
    output: terminal

  - key: "<c-o>"
    description: "Review uncommitted changes in revdiff"
    context: "global"
    command: "revdiff"
    output: terminal
