# Yazi — main behavior config.
# Flavors/plugins are declared in package.toml and installed by
# .chezmoiscripts/run_onchange_post-install-yazi.sh.tmpl via `ya pkg install`.

[mgr]
ratio          = [1, 3, 4]   # parent / current / preview
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
show_hidden    = false
show_symlink   = true
scrolloff      = 5
mouse_events   = ["click", "scroll"]
title_format   = "Yazi: {cwd}"

[preview]
wrap            = "no"
tab_size        = 2
max_width       = 1000
max_height      = 1500
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 75
ueberzug_scale  = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
  { run = '$EDITOR "$@"', desc = "Edit ($EDITOR)", block = true, for = "unix" },
]
open = [
  { run = 'open "$@"', desc = "Open (macOS default)", for = "macos" },
]
reveal = [
  { run = 'open -R "$1"', desc = "Reveal in Finder", for = "macos" },
  { run = 'exiftool "$1"; echo "Press enter to exit"; read _', desc = "Show EXIF", block = true, for = "unix" },
]
extract = [
  { run = 'ya pub extract --list "$@"', desc = "Extract here", for = "unix" },
]
play = [
  { run = 'open "$@"', desc = "Play (macOS default)", for = "macos" },
]

[open]
rules = [
  # Folders
  { mime = "inode/directory", use = ["edit", "open", "reveal"] },

  # Text-ish (let nvim handle them)
  { mime = "text/*",                 use = ["edit", "reveal"] },
  { mime = "*/{xml,javascript,wine-extension-ini,json}", use = ["edit", "reveal"] },

  # Images / video / audio → macOS default app
  { mime = "image/*",                use = ["open", "reveal"] },
  { mime = "{audio,video}/*",        use = ["play", "open", "reveal"] },

  # Archives
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}",
    use  = ["extract", "reveal"] },

  # Fallback — match anything by URL glob.
  { url = "*",                       use = ["open", "reveal"] },
  { url = "*/",                      use = ["open", "reveal"] },
]

[tasks]
micro_workers     = 10
macro_workers     = 25
bizarre_retry     = 5
image_alloc       = 536870912   # 512 MiB
image_bound       = [0, 0]
suppress_preload  = false

[plugin]
# Git status indicators next to file names — populated by the `git` plugin.
prepend_fetchers = [
  { url = "*",  run = "git", group = "git" },
  { url = "*/", run = "git", group = "git" },
]

# Skip the `file` shellout for MIME detection where the extension is enough.
# Big perf win in dirs with thousands of entries; falls through to default
# magic-byte detection for files without a known extension.
prepend_preloaders = [
  { url = "*", mime = "{audio,image,video}/*", run = "mime-ext" },
]

# Custom previewers via piper (wraps any shell command). Markdown via glow,
# directories via eza tree. Add more as you need them.
prepend_previewers = [
  { url = "*.md",  run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"' },
  { url = "*/",    run = 'piper -- eza -TL=3 --color=always --icons=always --group-directories-first --no-quotes "$1"' },
]

[input]
cd_title    = "Change directory:"
cd_origin   = "top-center"
cd_offset   = [0, 2, 50, 3]
create_title = ["Create:", "Create (dir):"]
rename_title = "Rename:"
filter_title = "Filter:"
find_title   = ["Find next:", "Find previous:"]
search_title = "Search via {n}:"
shell_title  = ["Shell:", "Shell (block):"]

[confirm]
trash_title  = "Trash {n} selected file{s}?"
delete_title = "Permanently delete {n} selected file{s}?"
overwrite_title = "Overwrite file?"
quit_title   = "Quit?"
